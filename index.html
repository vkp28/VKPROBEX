<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKP.REX | Elite Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#050505] text-white font-sans">

    <div id="landingPage">
        <nav class="flex justify-between items-center px-6 py-6 sticky top-0 z-50 glass">
            <div class="text-2xl font-bold tracking-tighter">VKP<span class="text-indigo-500">.REX</span></div>
            <button onclick="toggleModal()" class="bg-indigo-600 px-6 py-2 rounded-full font-bold">Login</button>
        </nav>

        <section class="h-[60vh] flex flex-col justify-center items-center text-center px-4">
            <h1 class="text-6xl font-black mb-4">The Next Gen <span class="gradient-text">Panel</span></h1>
            <p class="text-gray-400 max-w-xl">Log in to experience the VKP.REX custom dashboard.</p>
        </section>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/90 hidden flex justify-center items-center z-[100] backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-md border border-white/10">
            <h2 id="modalTitle" class="text-3xl font-bold text-center mb-6">Sign Up</h2>
            <form id="authForm" class="space-y-4">
                <input type="email" id="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500">
                <input type="password" id="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500">
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition">Action</button>
            </form>
            <button onclick="toggleAuthMode()" id="toggleBtn" class="w-full mt-4 text-indigo-400 text-sm">Switch to Login</button>
        </div>
    </div>

    <div id="dashboard" class="fixed inset-0 bg-[#050505] hidden z-[200] flex flex-col">
        <header class="flex justify-between items-center px-8 py-4 border-b border-white/5 bg-[#080808]">
            <div class="text-xl font-bold">VKP<span class="text-indigo-500">.REX</span></div>
            <div class="flex items-center gap-6">
                <span id="userDisplay" class="text-gray-400 text-sm"></span>
                <button onclick="logout()" class="text-red-500 text-sm font-bold bg-red-500/10 px-4 py-2 rounded-lg">Logout</button>
            </div>
        </header>

        <div class="flex justify-center gap-4 py-6 bg-[#0a0a0a]">
            <button onclick="switchTab('game')" id="tab-game" class="tab-btn active-tab">Game Hosting</button>
            <button onclick="switchTab('web')" id="tab-web" class="tab-btn">Web Hosting</button>
            <button onclick="switchTab('vps')" id="tab-vps" class="tab-btn">VPS Hosting</button>
            <button onclick="switchTab('reseller')" id="tab-reseller" class="tab-btn text-emerald-400 border-emerald-500/20">Reseller Hosting</button>
        </div>

        <main class="flex flex-1 overflow-hidden p-6 gap-6">
            <aside id="sidebar" class="w-72 space-y-2">
                </aside>

            <div class="flex-1 glass rounded-2xl border border-white/10 overflow-hidden flex flex-col">
                <div class="bg-[#151515] p-3 flex items-center gap-3">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                    <div id="urlBar" class="flex-1 bg-black/40 text-xs text-gray-500 py-1.5 px-4 rounded-md text-center">panel.vkprex.cloud</div>
                </div>
                <div id="panelView" class="flex-1 p-8 overflow-y-auto bg-[#0d0d0d]">
                    </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKP.REX | Premium Cloud Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="flex justify-between items-center px-10 py-6 sticky top-0 z-50 glass">
        <div class="text-2xl font-bold tracking-tighter text-white">VKP<span class="text-indigo-500">.REX</span></div>
        <div class="hidden md:flex gap-8 text-gray-400">
            <a href="#" class="hover:text-white">Home</a>
            <a href="#" class="hover:text-white">Game Servers</a>
            <a href="#" class="hover:text-white">VPS</a>
        </div>
        <button onclick="toggleModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-medium transition">Login</button>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-black mb-6 text-white">Elevate Your <span class="gradient-text">Gaming</span></h1>
        <p class="text-gray-400 text-xl max-w-2xl mb-10">High-performance hosting solutions. Experience zero lag and 99.9% uptime.</p>
        <div class="flex gap-4">
            <button class="bg-white text-black px-8 py-3 rounded-lg font-bold hover:bg-gray-200 transition">Get Started</button>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/80 hidden flex justify-center items-center z-[100] backdrop-blur-sm">
        <div class="glass p-10 rounded-2xl w-full max-w-md relative text-white">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl">&times;</button>
            <h2 class="text-3xl font-bold mb-8 text-center">Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 p-3 rounded-lg focus:outline-none">
                <input type="password" id="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 p-3 rounded-lg focus:outline-none">
                <button type="submit" class="w-full bg-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Sign In</button>
            </form>
            <p id="errorMsg" class="text-red-500 text-sm mt-4 hidden text-center">Invalid credentials!</p>
        </div>
    </div>

    <div id="dashboard" class="fixed inset-0 bg-[#050505] hidden z-[200] p-10 text-white">
        <div class="flex justify-between items-center">
            <h2 class="text-3xl font-bold text-indigo-500">Welcome to Ateex Panel</h2>
            <button onclick="logout()" class="text-gray-400 hover:text-white">Logout</button>
        </div>
        <div class="mt-20 glass p-20 rounded-3xl text-center">
            <h3 class="text-5xl font-bold">You are Logged In</h3>
            <p class="text-gray-400 mt-4">Database-free session active.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
